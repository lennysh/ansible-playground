---
ansible-navigator:
  mode: stdout
  ansible:
    config:
      path: ./ansible.cfg
    cmdline: -vvvvv playbook.yml -e @vars/benchmark.yml
    inventory:
      entries:
        - inventories/hosts.yml
  execution-environment:
    image: localhost/demo-winrm-vs-psrp-ee:latest
    pull:
      policy: missing
  playbook-artifact:
    enable: true
    replay: demo-winrm-vs-psrp_artifact.zip
  logging:
    level: warning
