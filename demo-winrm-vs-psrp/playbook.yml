---
# Run via ansible-navigator only (EE container — do not use ansible-playbook on the host).
#
#   cp vars/benchmark.example.yml vars/benchmark.yml
#   cp inventories/hosts.example.yml inventories/hosts.yml
#   ansible-navigator run playbook.yml -e @vars/benchmark.yml
#
# Compares WinRM vs PSRP under manual kinit (shared TGT) and managed kinit (per-task).

- name: Kerberos prep — krb5.conf and shared TGT for manual kinit benchmarks
  hosts: windows
  gather_facts: false
  tasks:
    - name: Deploy krb5.conf and obtain Kerberos TGT (manual mode)
      ansible.builtin.include_role:
        name: kerberos_prep

# --- Manual kinit — one kinit before all tasks; plugins use default ccache ---

- name: WinRM benchmark — manual kinit
  hosts: windows
  gather_facts: false
  vars:
    connection_benchmark_plugin: winrm
    connection_benchmark_kinit_mode: manual
  tasks:
    - name: Run WinRM timed benchmark (manual kinit)
      ansible.builtin.include_role:
        name: connection_benchmark
        tasks_from: measure.yml

- name: PSRP benchmark — manual kinit
  hosts: windows
  gather_facts: false
  vars:
    connection_benchmark_plugin: psrp
    connection_benchmark_kinit_mode: manual
  tasks:
    - name: Run PSRP timed benchmark (manual kinit)
      ansible.builtin.include_role:
        name: connection_benchmark
        tasks_from: measure.yml

- name: Comparison summary — manual kinit
  hosts: localhost
  gather_facts: false
  vars:
    connection_benchmark_kinit_mode: manual
  tasks:
    - name: Display WinRM vs PSRP comparison (manual kinit)
      ansible.builtin.include_role:
        name: connection_benchmark
        tasks_from: summary.yml

# --- Managed kinit — connection plugins handle kinit per task ---

- name: Clear ticket cache before managed kinit benchmarks
  hosts: windows
  gather_facts: false
  tasks:
    - name: kdestroy — empty ccache from manual suite
      ansible.builtin.include_role:
        name: kerberos_prep
        tasks_from: kdestroy.yml

- name: WinRM benchmark — managed kinit
  hosts: windows
  gather_facts: false
  vars:
    connection_benchmark_plugin: winrm
    connection_benchmark_kinit_mode: managed
  tasks:
    - name: Run WinRM timed benchmark (managed kinit)
      ansible.builtin.include_role:
        name: connection_benchmark
        tasks_from: measure.yml

- name: PSRP benchmark — managed kinit
  hosts: windows
  gather_facts: false
  vars:
    connection_benchmark_plugin: psrp
    connection_benchmark_kinit_mode: managed
  tasks:
    - name: Run PSRP timed benchmark (managed kinit)
      ansible.builtin.include_role:
        name: connection_benchmark
        tasks_from: measure.yml

- name: Comparison summary — managed kinit
  hosts: localhost
  gather_facts: false
  vars:
    connection_benchmark_kinit_mode: managed
  tasks:
    - name: Display WinRM vs PSRP comparison (managed kinit)
      ansible.builtin.include_role:
        name: connection_benchmark
        tasks_from: summary.yml

- name: Final comparison — manual vs managed kinit across WinRM and PSRP
  hosts: localhost
  gather_facts: false
  tasks:
    - name: Display final benchmark matrix and write report
      ansible.builtin.include_role:
        name: connection_benchmark
        tasks_from: summary_all.yml
