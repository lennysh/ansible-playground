---
- name: Step 1 - Dynamically Create 10 Fake Hosts
  hosts: localhost
  gather_facts: false
  tasks:
    - name: Add 10 fake local hosts to memory
      ansible.builtin.add_host:
        name: "fake-host-{{ item }}"
        groups: demo_hosts
        ansible_connection: local
      loop: "{{ range(1, 11) | list }}"

- name: Step 2 - Demonstrate Strategy Free
  hosts: demo_hosts
  gather_facts: false
  strategy: free  # <--- This forces hosts to run independently
  tasks:
    # ----------------------------------------------------
    # TASK 1
    # ----------------------------------------------------
    - name: "Task 1: Sleep"
      ansible.builtin.command: "sleep {{ (range(1, 10) | random) * 0.1 }}"
      changed_when: false

    - name: "Debug 1"
      ansible.builtin.debug:
        msg: "Host {{ inventory_hostname }} completed Task 1"

