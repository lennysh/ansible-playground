---
- name: TCP platform HTTPS port from gateway to component hosts
  ansible.builtin.include_tasks: tcp_probe.yml
  vars:
    aap_connectivity_current_suite: "platform-{{ _component.group }}"
    aap_connectivity_source_address: "{{ ansible_host | default(inventory_hostname) }}"
    aap_connectivity_target_host: "{{ item }}"
    aap_connectivity_target_address: "{{ hostvars[item].ansible_host | default(item) }}"
    aap_connectivity_target_port: >-
      {{
        hostvars[item][_component.port_var] | default(_component.default_port)
      }}
  loop: "{{ groups.get(_component.group, []) }}"
  loop_control:
    label: "{{ inventory_hostname }} -> {{ item }}:{{ hostvars[item][_component.port_var] | default(_component.default_port) }}"
  when: groups.get(_component.group, []) | length > 0
