---
- name: Build redis peer list
  ansible.builtin.set_fact:
    aap_connectivity_redis_peers: >-
      {{
        groups.get('redis', [])
        | difference([inventory_hostname] if aap_connectivity_skip_self else [])
        | list
      }}
  when: inventory_hostname in groups.get('redis', [])

- name: TCP redis client port to peers
  ansible.builtin.include_tasks: tcp_probe.yml
  vars:
    aap_connectivity_current_suite: redis
    aap_connectivity_source_address: "{{ ansible_host | default(inventory_hostname) }}"
    aap_connectivity_target_host: "{{ item }}"
    aap_connectivity_target_address: "{{ hostvars[item].ansible_host | default(item) }}"
    aap_connectivity_target_port: "{{ aap_connectivity_redis_port }}"
  loop: "{{ aap_connectivity_redis_peers | default([]) }}"
  loop_control:
    label: "{{ inventory_hostname }} -> {{ item }}:{{ aap_connectivity_redis_port }}"
  when: inventory_hostname in groups.get('redis', [])

- name: TCP redis cluster bus port to peers
  ansible.builtin.include_tasks: tcp_probe.yml
  vars:
    aap_connectivity_current_suite: redis-cluster-bus
    aap_connectivity_source_address: "{{ ansible_host | default(inventory_hostname) }}"
    aap_connectivity_target_host: "{{ item }}"
    aap_connectivity_target_address: "{{ hostvars[item].ansible_host | default(item) }}"
    aap_connectivity_target_port: "{{ aap_connectivity_redis_cluster_port }}"
  loop: "{{ aap_connectivity_redis_peers | default([]) }}"
  loop_control:
    label: "{{ inventory_hostname }} -> {{ item }}:{{ aap_connectivity_redis_cluster_port }}"
  when:
    - inventory_hostname in groups.get('redis', [])
    - aap_connectivity_redis_mode == 'cluster'
