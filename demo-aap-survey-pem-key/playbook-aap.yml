---
# AAP job template entry point.
#
# Survey question (required):
#   survey_pem_key — Password type (masked single-line field in the UI)
#
# Optional extra vars:
#   aap_survey_pem_key_validate — validate with openssl/ssh-keygen (default true)
#   aap_survey_pem_key_var       — extra-var name for squashed survey input (default survey_pem_key)
#
# Paste a multi-line PEM or OpenSSH private key into the Password survey field.
# AAP collapses newlines to spaces; this role rebuilds proper PEM line breaks
# before downstream tasks use aap_survey_pem_key_reconstructed.
- name: Reconstruct squashed Password survey PEM key
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - name: Reconstruct and validate survey PEM key
      ansible.builtin.include_role:
        name: aap_survey_pem_key
