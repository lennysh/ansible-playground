---
- name: Report PEM key reconstruction summary (no secret material)
  ansible.builtin.debug:
    msg:
      survey_variable: "{{ aap_survey_pem_key_var }}"
      detected_pem_type: "{{ aap_survey_pem_key_type }}"
      squashed_input_length: "{{ aap_survey_pem_key_raw | length }}"
      reconstructed_line_count: "{{ aap_survey_pem_key_reconstructed.split('\n') | length }}"
      base64_body_length: "{{ aap_survey_pem_key_base64_body | length }}"
      validated: "{{ aap_survey_pem_key_validate | bool }}"
      validation_rc: "{{ aap_survey_pem_key_validation_rc | default('skipped') }}"
      ready_for_use: >-
        Use fact aap_survey_pem_key_reconstructed in later tasks
        (for example copy/content, community.crypto modules, or command stdin).
