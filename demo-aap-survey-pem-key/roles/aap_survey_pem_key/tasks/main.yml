---
- name: Resolve survey PEM key from configured variable name
  ansible.builtin.set_fact:
    aap_survey_pem_key_raw: "{{ lookup('vars', aap_survey_pem_key_var) }}"
  no_log: true

- name: Fail early if the survey PEM key is missing or empty
  ansible.builtin.assert:
    that:
      - aap_survey_pem_key_raw is defined
      - aap_survey_pem_key_raw | trim | length > 0
    fail_msg: >-
      The survey PEM key variable '{{ aap_survey_pem_key_var }}' is missing or empty.
      In AAP, add a Password survey question with that exact name.

- name: Reconstruct squashed PEM key structure
  ansible.builtin.include_tasks: reconstruct.yml

- name: Validate reconstructed PEM private key
  ansible.builtin.include_tasks: validate.yml
  when: aap_survey_pem_key_validate | bool

- name: Report PEM key reconstruction summary
  ansible.builtin.include_tasks: report.yml
