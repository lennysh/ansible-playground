---
# CLI / survey-friendly update: builds case_updates_needed from case_comment
# and/or case_attachment, then runs the same roles as
# infra.support_assist.rh_case_update.
#
# Inventory: target localhost and/or remote hosts (same as the collection
# playbook). Use -l / AAP limit to select nodes. Attachment paths are read on
# each targeted host (e.g. same path on three servers → three uploads).
#
# Required: case_id, redhat_offline_token (or REDHAT_OFFLINE_TOKEN)
# Optional: case_comment, case_attachment (at least one required),
#           case_comment_type (markdown|plaintext, default markdown)
# Or pass a non-empty case_updates_needed directly (skips the builder).
#
# Token: rh_token_refresh runs on each play host (local /tmp cache ~15m per
# node). Avoid delegate_to localhost — delegated set_fact does not distribute
# cleanly to inventory hosts.
- name: Add comment(s) or attach file(s) to Red Hat Support Case
  hosts: all
  gather_facts: false
  tasks:
    - name: Fail when case_id is missing
      run_once: true
      ansible.builtin.assert:
        that:
          - case_id is defined
          - case_id | string | trim | length > 0
        fail_msg: Set case_id to the existing Red Hat Support Case number.

    - name: Build case_updates_needed from survey-friendly vars
      run_once: true
      when: >-
        case_updates_needed is not defined
        or case_updates_needed is none
        or (case_updates_needed | length | int) == 0
      block:
        - name: Compose case_updates_needed from case_comment / case_attachment
          ansible.builtin.set_fact:
            case_updates_needed: "{{ __case_updates }}"
          vars:
            __comment_type: "{{ case_comment_type | default('markdown') | trim }}"
            __case_updates: >-
              {{
                (
                  [{
                    'comment': case_comment | trim,
                    'commentType': __comment_type
                  }]
                  if (case_comment | default('') | string | trim | length > 0)
                  else []
                )
                + (
                  [{
                    'attachment': case_attachment | trim,
                    'attachmentDescription': (
                      case_attachment_description
                      | default('Uploaded via demo-support-assist')
                    )
                  }]
                  if (case_attachment | default('') | string | trim | length > 0)
                  else []
                )
              }}

        - name: Fail when neither comment nor attachment was provided
          ansible.builtin.assert:
            that:
              - case_updates_needed | length > 0
            fail_msg: >-
              Provide case_comment and/or case_attachment in the survey (or -e),
              or set a non-empty case_updates_needed list explicitly.
              The rh_case role does not accept case_comment/case_attachment
              directly — this playbook maps them into case_updates_needed.

    - name: Share built case_updates_needed with all play hosts
      ansible.builtin.set_fact:
        case_updates_needed: "{{ hostvars[ansible_play_hosts_all | first]['case_updates_needed'] }}"

    - name: Split comments vs attachments for multi-host safety
      ansible.builtin.set_fact:
        case_updates_comments: >-
          {{
            case_updates_needed
            | selectattr('comment', 'defined')
            | selectattr('comment', 'ne', '')
            | list
          }}
        case_updates_attachments: >-
          {{
            case_updates_needed
            | selectattr('attachment', 'defined')
            | selectattr('attachment', 'ne', '')
            | list
          }}

    - name: Show updates that will be applied
      run_once: true
      ansible.builtin.debug:
        msg:
          hosts: "{{ ansible_play_hosts_all }}"
          comments: "{{ case_updates_comments }}"
          attachments_per_host: "{{ case_updates_attachments }}"

    # Per host: role caches under /tmp on that node (~15m). Prefer this over
    # delegate_to localhost — set_fact from a delegated role does not land in
    # hostvars['localhost'] reliably for later distribution.
    - name: Refresh Red Hat API token on each play host
      ansible.builtin.include_role:
        name: infra.support_assist.rh_token_refresh

    # Comments are identical API posts — run once for the play (rh_case's
    # comment task is not run_once, so a bare multi-host role call would
    # duplicate the same comment N times).
    - name: Post case comment(s) once for the play
      run_once: true
      when: case_updates_comments | length > 0
      block:
        - name: Set comment-only updates for rh_case
          ansible.builtin.set_fact:
            case_updates_needed: "{{ case_updates_comments }}"

        - name: Call rh_case role (comments)
          ansible.builtin.include_role:
            name: infra.support_assist.rh_case

    # Attachments are read from each targeted host's filesystem (curl -F file=@…).
    - name: Upload attachment(s) from each targeted host
      when: case_updates_attachments | length > 0
      block:
        - name: Set attachment-only updates for rh_case
          ansible.builtin.set_fact:
            case_updates_needed: "{{ case_updates_attachments }}"

        - name: Call rh_case role (attachments)
          ansible.builtin.include_role:
            name: infra.support_assist.rh_case
