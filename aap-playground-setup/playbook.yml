---
# Apply / refresh Lenny's Ansible Playground AAP objects (Config as Code).
#
# Run from the seeded "Playground | Apply CaC" job template (AAP Credential
# attached), or from the CLI with auth env vars:
#
#   export AAP_HOSTNAME=https://aap.example.com
#   export AAP_USERNAME=admin
#   export AAP_PASSWORD=...
#   # or: export AAP_TOKEN=...
#   ansible-playbook aap-playground-setup/playbook.yml
#   # optional: -e @extra_vars.example.yml (see that file + README)
#
- name: Apply Lenny's Ansible Playground CaC
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - name: Check whether AAP / Controller auth is already available
      ansible.builtin.set_fact:
        playground_aap_auth_ok: >-
          {{
            (lookup('env', 'CONTROLLER_HOST') | default('', true) | length > 0)
            or (lookup('env', 'AAP_HOSTNAME') | default('', true) | length > 0)
          }}

    - name: Assert AAP authentication environment variables are set
      when: not (playground_aap_auth_ok | bool)
      ansible.builtin.assert:
        that:
          - lookup('env', 'AAP_HOSTNAME') | default('', true) | length > 0
          - >-
            (lookup('env', 'AAP_TOKEN') | default('', true) | length > 0)
            or (
              (lookup('env', 'AAP_USERNAME') | default('', true) | length > 0)
              and (lookup('env', 'AAP_PASSWORD') | default('', true) | length > 0)
            )
        fail_msg:
          - "Set AAP auth for CLI runs, or attach an AAP Credential when launching from a job template:"
          - "  export AAP_HOSTNAME=https://your-aap-server.example.com"
          - "  export AAP_USERNAME=admin"
          - "  export AAP_PASSWORD=<password>"
          - "  # or: export AAP_TOKEN=<token>"

    - name: Map AAP_* env vars for infra.aap_configuration when CONTROLLER_* is unset
      when:
        - lookup('env', 'CONTROLLER_HOST') | default('', true) | length == 0
        - lookup('env', 'AAP_HOSTNAME') | default('', true) | length > 0
      ansible.builtin.set_fact:
        aap_hostname: "{{ lookup('env', 'AAP_HOSTNAME') }}"
        aap_username: "{{ lookup('env', 'AAP_USERNAME') | default(omit, true) }}"
        aap_password: "{{ lookup('env', 'AAP_PASSWORD') | default(omit, true) }}"
        aap_token: "{{ lookup('env', 'AAP_TOKEN') | default(omit, true) }}"
        aap_validate_certs: "{{ lookup('env', 'AAP_VALIDATE_CERTS') | default(true) }}"

    - name: Load playground CaC variable files
      ansible.builtin.include_vars:
        dir: "{{ playbook_dir }}/vars"
        extensions:
          - yml
          - yaml

    - name: Resolve demo job template selection
      ansible.builtin.set_fact:
        # First clickops launch has no survey yet → playground_demos undefined →
        # Setup JT only (adds the survey without creating every demo).
        # Survey / -e with a list → those demos. playground_apply_all_demos → all.
        playground_demos_selected: >-
          {{
            playground_demo_templates
            if (playground_apply_all_demos | default(false) | bool)
            else (
              (
                playground_demos
                if (playground_demos is sequence and playground_demos is not string)
                else (
                  playground_demos | default('') | string
                  | replace('\r', '') | split('\n')
                  | map('trim') | reject('equalto', '') | list
                )
              )
              if playground_demos is defined
              else []
            )
          }}

    - name: Filter controller_templates to Setup JT plus selected demos
      ansible.builtin.set_fact:
        controller_templates: >-
          {{
            (
              controller_templates
              | selectattr('name', 'equalto', 'Playground | Apply CaC')
              | list
            )
            + (
              controller_templates
              | selectattr('name', 'in', playground_demos_selected)
              | list
            )
          }}

    - name: Collect optional playground_demo_deps extras for selected demos
      ansible.builtin.set_fact:
        playground_deps_extras: >-
          {{
            playground_demos_selected
            | select('in', (playground_demo_deps | default({})) | list)
            | map('extract', playground_demo_deps | default({}))
            | list
          }}

    - name: Resolve supporting objects needed by selected demos
      ansible.builtin.set_fact:
        # Union of always-on + JT refs + optional playground_demo_deps extras.
        # Deselected demos skip create; existing objects are not deleted.
        playground_needed_credentials: >-
          {{
            (
              (playground_always_credentials | default([]))
              + (
                  controller_templates
                  | selectattr('credentials', 'defined')
                  | map(attribute='credentials')
                  | flatten
                  | list
                )
              + (
                  playground_deps_extras
                  | selectattr('credentials', 'defined')
                  | map(attribute='credentials')
                  | flatten
                  | list
                )
            ) | unique | list
          }}
        playground_needed_inventories: >-
          {{
            (
              (playground_always_inventories | default([]))
              + (
                  controller_templates
                  | selectattr('inventory', 'defined')
                  | map(attribute='inventory')
                  | reject('equalto', none)
                  | reject('equalto', '')
                  | list
                )
              + (
                  playground_deps_extras
                  | selectattr('inventories', 'defined')
                  | map(attribute='inventories')
                  | flatten
                  | list
                )
            ) | unique | list
          }}
        playground_needed_ees: >-
          {{
            (
              (
                  controller_templates
                  | selectattr('execution_environment', 'defined')
                  | map(attribute='execution_environment')
                  | reject('equalto', none)
                  | reject('equalto', '')
                  | list
                )
              + (
                  playground_deps_extras
                  | selectattr('execution_environments', 'defined')
                  | map(attribute='execution_environments')
                  | flatten
                  | list
                )
            ) | unique | list
          }}
        playground_needed_credential_types: >-
          {{
            (
              playground_deps_extras
              | selectattr('credential_types', 'defined')
              | map(attribute='credential_types')
              | flatten
              | list
            ) | unique | list
          }}

    - name: Filter credentials, inventories, hosts, and execution environments
      ansible.builtin.set_fact:
        controller_credentials: >-
          {{
            controller_credentials
            | selectattr('name', 'in', playground_needed_credentials)
            | list
          }}
        controller_inventories: >-
          {{
            controller_inventories
            | selectattr('name', 'in', playground_needed_inventories)
            | list
          }}
        controller_hosts: >-
          {{
            controller_hosts
            | selectattr('inventory', 'in', playground_needed_inventories)
            | list
          }}
        controller_execution_environments: >-
          {{
            controller_execution_environments
            | selectattr('name', 'in', playground_needed_ees)
            | list
          }}

    - name: Filter custom credential types to those required by kept credentials
      ansible.builtin.set_fact:
        # Built-in types (Machine, AAP) are not in controller_credential_types.
        controller_credential_types: >-
          {{
            controller_credential_types
            | selectattr(
                'name',
                'in',
                (
                  playground_needed_credential_types
                  + (controller_credentials | map(attribute='credential_type') | list)
                ) | unique | list
              )
            | list
          }}

    - name: Show which demo job templates will be applied
      ansible.builtin.debug:
        msg: >-
          Applying Setup JT + {{ playground_demos_selected | length }} demo(s):
          {{ playground_demos_selected | join(', ')
             if playground_demos_selected | length > 0
             else '(none — Setup JT only)' }}

    - name: Show supporting objects derived from selection
      ansible.builtin.debug:
        msg:
          - "Credentials: {{ controller_credentials | map(attribute='name') | list }}"
          - "Credential types: {{ controller_credential_types | map(attribute='name') | list }}"
          - "Inventories: {{ controller_inventories | map(attribute='name') | list }}"
          - "Hosts: {{ controller_hosts | map(attribute='name') | list }}"
          - "Execution environments: {{ controller_execution_environments | map(attribute='name') | list }}"

    - name: Apply automation controller / platform configuration
      ansible.builtin.include_role:
        name: infra.aap_configuration.dispatch
