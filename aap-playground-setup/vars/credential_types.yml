---
# Custom credential types used by playground demos.
# Offline token field/injector names match demo-download-collection-tarball
# (redhat_offline_token). Satellite injectors match demo-satellite-sync-and-promote.
controller_credential_types:
  - name: "{{ playground_offline_token_credential_type }}"
    description: Injects redhat_offline_token for API Access
    kind: cloud
    inputs:
      fields:
        - id: redhat_offline_token
          label: Red Hat Offline Token
          type: string
          secret: true
          help_text: Create at https://access.redhat.com/management/api
      # Optional so CaC can create an empty shell (state: exists); fill in the UI.
      required: []
    injectors:
      extra_vars:
        redhat_offline_token: !unsafe '{{ redhat_offline_token }}'

  - name: "{{ playground_satellite_credential_type }}"
    description: Satellite API URL and credentials for content lifecycle demos
    kind: cloud
    inputs:
      fields:
        - id: host
          label: Satellite URL
          type: string
          help_text: e.g. https://satellite.example.org
        - id: username
          label: Username
          type: string
        - id: password
          label: Password
          type: string
          secret: true
      # Optional so CaC can create an empty shell (state: exists); fill in the UI.
      required: []
    injectors:
      extra_vars:
        satellite_server_url: !unsafe '{{ host }}'
        satellite_username: !unsafe '{{ username }}'
        satellite_password: !unsafe '{{ password }}'

  - name: "{{ playground_vmware_credential_type }}"
    description: Shared vCenter username/password for VMware survey-option gather demos
    kind: cloud
    inputs:
      fields:
        - id: username
          label: Username
          type: string
          help_text: e.g. ansible-automation@vsphere.local
        - id: password
          label: Password
          type: string
          secret: true
      # Optional so CaC can create an empty shell (state: exists); fill in the UI.
      required: []
    injectors:
      extra_vars:
        vmware_username: !unsafe '{{ username }}'
        vmware_password: !unsafe '{{ password }}'
