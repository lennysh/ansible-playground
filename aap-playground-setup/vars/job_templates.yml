          variable: case_product_version
          type: text
          required: true
          default: ""
        - question_name: Case Summary/Title
          question_description: >-
            A short, descriptive summary of the issue (Max 255 characters). This serves as the public
            title of the case.
          variable: case_summary
          type: text
          required: true
          default: Automated Test Case Creation - OpenShift Must Gather Upload TEST
        - question_name: Problem Description/Details
          question_description: >-
            A detailed explanation of the issue, including steps to reproduce, observed behavior, and
            expected results. Provide as much detail as possible. (Markdown format is supported)
          variable: case_description
          type: textarea
          required: true
          default: Automated case created via Ansible Automation Platform for testing purposes.
        - question_name: What is the Type of Issue?
          question_description: >-
            Select the category that best defines the issue to ensure the case is routed to the
            correct support queue (e.g., Configuration, Bug, or Usage).
          variable: case_type
          type: multiplechoice
          required: true
          default: Configuration Issue
          choices:
            - Account / Customer Service Request
            - Certification
            - Configuration Issue
            - Defect / Bug
            - Feature / Enhancement Request
            - Other
            - RCA Only
            - Usage / Documentation Help
        - question_name: Case Severity
          question_description: >-
            Select the severity based on the immediate business impact. **1 (Urgent)** requires
            severe, critical impact; **4 (Low)** is a non-urgent query or information request.
          variable: case_severity
          type: multiplechoice
          required: true
          default: 4 (Low)
          choices:
            - 1 (Urgent)
            - 2 (High)
            - 3 (Normal)
            - 4 (Low)
        - question_name: OpenShift Login Token
          question_description: >-
            The Bearer token (Service Account or OAuth token) required to log into the OpenShift
            Cluster API and run the Must-Gather command.
          variable: ocp_must_gather_token
          type: password
          required: true
          default: ""
        - question_name: OpenShift Cluster API URL
          question_description: >-
            The full URL (e.g., https://api.mycluster.domain:6443) of your OpenShift cluster's control
            plane endpoint.
          variable: ocp_must_gather_server_url
          type: text
          required: true
          default: "https://api.example.invalid:6443"
        - question_name: Validate SSL
          question_description: >-
            Set to 'true' to ensure the authenticity of the cluster's SSL certificate. Set to 'false'
            only if using a self-signed or internal CA certificate, which is generally discouraged.
          variable: ocp_must_gather_validate_ssl
          type: multiplechoice
          required: true
          default: "false"
          choices:
            - "true"
            - "false"
        - question_name: Must Gather Component Collection Acronym
          question_description: >-
            Select the must-gather image/acronym to use for data collection (e.g., DEFAULT, AAP, ODF).
            Full list of options and descriptions available in [roles/ocp_must_gather/vars/main.yml].
          variable: ocp_must_gather_image
          type: multiplechoice
          required: true
          default: AAP
          choices:
            - DEFAULT
            - AAP
            - CNV
            - COMPLIANCE
            - GITOPS
            - LOGGING
            - LSO
            - LVM
            - MTC
            - NRO
            - OADP
            - ODF
            - OSSM
            - PTP
            - RHACM
            - RHOAI
            - SEC
            - SVLS
        - question_name: "Must Gather Time Range (blank = full history)"
          question_description: >-
            Defines the time window for which Must-Gather should collect logs and events, optimizing
            file size and ensuring relevance to the issue time. Leave blank for full history.
          variable: ocp_must_gather_since
          type: multiplechoice
          required: true
          default: 1h
          choices:
            - ""
            - 1h
            - 3h
            - 6h
            - 12h
            - 24h
            - 3d
            - 7d
            - 14d
            - 30d
        - question_name: Disconnected/Air-Gapped Environment?
          question_description: >-
            Set to 'true' if the cluster cannot access Red Hat image registries directly (Air-Gapped
            mode).
          variable: ocp_must_gather_disconnected_mode
          type: multiplechoice
          required: true
          default: "false"
          choices:
            - "true"
            - "false"
        - question_name: Mirror Registry Address (required if Disconnected = true)
          question_description: >-
            The full path to the internal mirror registry containing the must-gather payload image
            (e.g., registry.local/openshift4/ose-cli).
          variable: ocp_must_gather_disconnected_registry
          type: text
          required: false

