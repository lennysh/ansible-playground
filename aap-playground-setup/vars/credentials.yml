---
# Playground credentials. state: exists → create if missing, never modify if
# present (UI edits to username/host/secrets survive CaC re-runs).
#
# No placeholder defaults. Optional survey / -e overrides apply only on the
# initial create (exists skips updates). Blank/whitespace after |trim → omit.
controller_credentials:
  - name: "{{ playground_aap_credential_name }}"
    description: AAP API credential for Playground | Apply CaC
    credential_type: Red Hat Ansible Automation Platform
    organization: "{{ playground_org_name }}"
    update_secrets: false
    state: exists
    inputs:
      host: "{{ lookup('env', 'AAP_HOSTNAME') | default(lookup('env', 'CONTROLLER_HOST') | default(omit, true), true) }}"
      username: "{{ lookup('env', 'AAP_USERNAME') | default(lookup('env', 'CONTROLLER_USERNAME') | default(omit, true), true) }}"
      password: "{{ lookup('env', 'AAP_PASSWORD') | default(lookup('env', 'CONTROLLER_PASSWORD') | default(omit, true), true) }}"
      oauth_token: "{{ lookup('env', 'AAP_TOKEN') | default(lookup('env', 'CONTROLLER_OAUTH_TOKEN') | default(omit, true), true) }}"
      verify_ssl: "{{ lookup('env', 'AAP_VALIDATE_CERTS') | default(omit, true) }}"

  - name: "{{ playground_machine_credential_name }}"
    description: >-
      Machine credential placeholder — update with SSH key (Linux) and/or
      UPN + password (Windows / Kerberos demos)
    credential_type: Machine
    organization: "{{ playground_org_name }}"
    update_secrets: false
    state: exists
    inputs:
      username: "{{ (playground_machine_username | default('') | trim) | default(omit, true) }}"

  - name: "{{ playground_satellite_credential_name }}"
    description: Satellite API placeholder — set URL, username, and password in the UI
    credential_type: "{{ playground_satellite_credential_type }}"
    organization: "{{ playground_org_name }}"
    update_secrets: false
    state: exists
    inputs:
      host: "{{ (playground_satellite_url | default('') | trim) | default(omit, true) }}"
      username: "{{ (playground_satellite_username | default('') | trim) | default(omit, true) }}"
      password: "{{ (playground_satellite_password | default('') | trim) | default(omit, true) }}"

  - name: "{{ playground_offline_token_credential_name }}"
    description: Red Hat offline token placeholder — set token from https://access.redhat.com/management/api
    credential_type: "{{ playground_offline_token_credential_type }}"
    organization: "{{ playground_org_name }}"
    update_secrets: false
    state: exists
    inputs:
      redhat_offline_token: "{{ (playground_offline_token | default('') | trim) | default(omit, true) }}"

  - name: "{{ playground_vmware_credential_name }}"
    description: >-
      VMware vSphere placeholder — set shared vCenter username/password in the UI
      (vCenter host list is a Job Template survey)
    credential_type: "{{ playground_vmware_credential_type }}"
    organization: "{{ playground_org_name }}"
    update_secrets: false
    state: exists
    inputs:
      username: "{{ (playground_vmware_username | default('') | trim) | default(omit, true) }}"
      password: "{{ (playground_vmware_password | default('') | trim) | default(omit, true) }}"
