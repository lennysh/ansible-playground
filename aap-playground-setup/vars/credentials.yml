---
# Placeholder credentials. update_secrets: false so re-running CaC does not
# wipe values filled in via the UI after the first Apply.
controller_credentials:
  - name: "{{ playground_aap_credential_name }}"
    description: AAP API credential for Playground | Apply CaC
    credential_type: Red Hat Ansible Automation Platform
    organization: "{{ playground_org_name }}"
    update_secrets: false
    state: exists
    inputs:
      host: "{{ lookup('env', 'AAP_HOSTNAME') | default(lookup('env', 'CONTROLLER_HOST') | default('https://example.invalid', true), true) }}"
      username: "{{ lookup('env', 'AAP_USERNAME') | default(lookup('env', 'CONTROLLER_USERNAME') | default(omit, true), true) }}"
      password: "{{ lookup('env', 'AAP_PASSWORD') | default(lookup('env', 'CONTROLLER_PASSWORD') | default(omit, true), true) }}"
      oauth_token: "{{ lookup('env', 'AAP_TOKEN') | default(lookup('env', 'CONTROLLER_OAUTH_TOKEN') | default(omit, true), true) }}"
      verify_ssl: "{{ lookup('env', 'AAP_VALIDATE_CERTS') | default(true) }}"

  - name: "{{ playground_machine_credential_name }}"
    description: >-
      Machine credential placeholder — update with SSH key (Linux) and/or
      UPN + password (Windows / Kerberos demos)
    credential_type: Machine
    organization: "{{ playground_org_name }}"
    update_secrets: false
    inputs:
      username: "{{ playground_machine_username | default('ec2-user') }}"

  - name: "{{ playground_satellite_credential_name }}"
    description: Satellite API placeholder — set URL, username, and password in the UI
    credential_type: "{{ playground_satellite_credential_type }}"
    organization: "{{ playground_org_name }}"
    update_secrets: false
    inputs:
      host: "{{ playground_satellite_url | default('https://satellite.example.invalid') }}"
      username: "{{ playground_satellite_username | default('admin') }}"
      password: "{{ playground_satellite_password | default('REPLACE_ME') }}"

  - name: "{{ playground_offline_token_credential_name }}"
    description: Hub offline token placeholder — set token from access.redhat.com
    credential_type: "{{ playground_offline_token_credential_type }}"
    organization: "{{ playground_org_name }}"
    update_secrets: false
    inputs:
      redhat_offline_token: "{{ playground_offline_token | default('REPLACE_ME') }}"
