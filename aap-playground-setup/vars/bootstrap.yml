---
# Naming and SCM constants shared by CaC object definitions.
playground_org_name: "Lenny's Ansible Playground"
playground_project_name: "Lenny's Ansible Playground"
playground_inventory_name: "Playground localhost Inventory"
playground_fake_hosts_inventory_name: "Playground Fake Hosts Inventory"
playground_windows_inventory_name: "Playground Windows Inventory"
playground_scm_url: "https://github.com/lennysh/ansible-playground.git"
playground_scm_branch: "main"

playground_aap_credential_name: "AAP Credential"
playground_machine_credential_name: "Playground Machine Credential"
playground_satellite_credential_name: "Playground Satellite Credential"
playground_vmware_credential_name: "Playground VMware vSphere"
playground_offline_token_credential_name: "Playground Red Hat Offline Token"
playground_offline_token_credential_type: "Red Hat Offline Token"
playground_satellite_credential_type: "Red Hat Satellite Server"
playground_vmware_credential_type: "VMware vSphere"

# Demo job templates selectable on Playground | Apply CaC (multiselect survey).
# Keep in sync with Demo | … entries in vars/job_templates.yml.
playground_demo_templates:
  - "Demo | AAP Connectivity"
  - "Demo | AAP Survey PEM Key"
  - "Demo | Ansible Filters"
  - "Demo | Download Collection Tarball"
  - "Demo | Forks and Async"
  - "Demo | Hosts Advanced"
  - "Demo | Jinja2 Filters"
  - "Demo | Kerberos WinRM"
  - "Demo | Project Sync Collections"
  - "Demo | Satellite Sync and Promote"
  - "Demo | Strategy Free"
  - "Demo | VMware Provision Survey"
  - "Demo | VMware Survey Options"
  - "Demo | Support Assist | AAP API Gather | Create Case"
  - "Demo | Support Assist | AAP API Gather | Update Case"
  - "Demo | Support Assist | OCP Must Gather | Create Case"
  - "Demo | Support Assist | OCP Must Gather | Update Case"
  - "Demo | Support Assist | RH Case | Create"
  - "Demo | Support Assist | RH Case | Update"
  - "Demo | Support Assist | SOS Report | Create Case"
  - "Demo | Support Assist | SOS Report | Update Case"
  - "Demo | When"
  - "Demo | WinRM vs PSRP"

playground_ee_kerberos_winrm: "demo-kerberos-winrm-ee"
playground_ee_winrm_vs_psrp: "demo-winrm-vs-psrp-ee"
# Override with a registry the controller can pull from, e.g.:
#   playground_ee_registry: quay.io/example
playground_ee_registry: ""
playground_ee_kerberos_winrm_image: >-
  {{
    (
      (playground_ee_registry ~ '/')
      if playground_ee_registry | length > 0
      else ''
    )
    ~ playground_ee_kerberos_winrm ~ ':latest'
  }}
playground_ee_winrm_vs_psrp_image: >-
  {{
    (
      (playground_ee_registry ~ '/')
      if playground_ee_registry | length > 0
      else ''
    )
    ~ playground_ee_winrm_vs_psrp ~ ':latest'
  }}
