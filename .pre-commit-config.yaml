# See https://pre-commit.com for more information
repos:
  - repo: local
    hooks:
      - id: sanitize-strings
        name: Scrub sensitive strings before commit
        description: >-
          Rewrites configured old:new string pairs in staged text files
          (see scripts/sanitize-strings.conf.example).
        entry: scripts/sanitize-strings.sh
        language: script
        types: [text]
