plugin: community.proxmox.proxmox
validate_certs: false
want_facts: false
want_post_filter_facts: true
keyed_groups:
    # proxmox_tags_parsed is an example of a fact only returned when 'want_facts=true'
  - key: proxmox_tags_parsed
    separator: ""
    prefix: ""
# groups:
#   webservers: "'web' in (proxmox_tags_parsed | list)"
#   mailservers: "'mail' in (proxmox_tags_parsed | list)"
# compose:
# Note that this can easily give you wrong values as ansible_host. See further below for
# an example where this is set to `false` and where ansible_host is set with `compose`.
# want_proxmox_nodes_ansible_host: true
exclude_nodes: true
want_proxmox_nodes_ansible_host: false
compose:
  # ansible_port: 2222
  ansible_host: >-
    {{
      proxmox_agent_interfaces
      | map(attribute='ip-addresses')
      | flatten
      | select('match', '^10\.35\.')
      | first
      | regex_replace('/.*$', '')
      if proxmox_vmtype == 'qemu'
      else (
        proxmox_lxc_interfaces
        | selectattr('inet', 'defined')
        | selectattr('inet', 'match', '^10\.35\.')
        | map(attribute='inet')
        | flatten
        | first
        | regex_replace('/.*$', '')
      )
    }}
filters:
  # - proxmox_vmtype in ['qemu', 'lxc']
  - proxmox_tags_parsed is defined and 'aap-demolab-inv' in proxmox_tags_parsed
