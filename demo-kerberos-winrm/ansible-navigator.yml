---
ansible-navigator:
  mode: stdout
  ansible:
    config:
      path: ./ansible.cfg
    cmdline: playbook.yml -e @vars/kerberos.yml
    inventory:
      entries:
        - inventories/hosts.yml
  execution-environment:
    image: localhost/demo-kerberos-winrm-ee:latest
    pull:
      policy: missing
  playbook-artifact:
    enable: false
    replay: demo-kerberos-winrm_artifact.zip
  logging:
    level: warning
