---
- name: Validate kinit credentials are defined
  ansible.builtin.assert:
    that:
      - _kinit_principal | length > 0
      - _kinit_password | length > 0
    fail_msg: >-
      Set ansible_user (UPN) and ansible_password in vars/kerberos.yml, or set
      kerberos_kinit_user / kerberos_kinit_password explicitly.
  vars:
    _kinit_principal: "{{ kerberos_kinit_user | default(ansible_user) }}"
    _kinit_password: "{{ kerberos_kinit_password | default(ansible_password) }}"

- name: Obtain Kerberos TGT into default credential cache
  ansible.builtin.command:
    cmd: kinit {{ _kinit_principal | quote }}
    stdin: "{{ _kinit_password }}\n"
  vars:
    _kinit_principal: "{{ kerberos_kinit_user | default(ansible_user) }}"
    _kinit_password: "{{ kerberos_kinit_password | default(ansible_password) }}"
  register: kinit_result
  no_log: true
  changed_when: false
  failed_when: false

- name: Log kinit result
  ansible.builtin.shell: |
    echo "" >> {{ kerberos_diag_log_path | quote }}
    echo "========== KINIT ==========" >> {{ kerberos_diag_log_path | quote }}
    echo "--- kinit {{ _kinit_principal }} (rc={{ kinit_result.rc }}) ---" \
      >> {{ kerberos_diag_log_path | quote }}
    if [ {{ kinit_result.rc }} -ne 0 ]; then
      echo "kinit stderr: {{ kinit_result.stderr | default('') | replace('\"', '\\\"') }}" \
        >> {{ kerberos_diag_log_path | quote }}
      echo "kinit failed (see klist below for cache state)" \
        >> {{ kerberos_diag_log_path | quote }}
    fi
  vars:
    _kinit_principal: "{{ kerberos_kinit_user | default(ansible_user) }}"
  changed_when: false
  failed_when: false

- name: Write diagnostic report after kinit failure
  ansible.builtin.include_tasks: display_log.yml
  when: kinit_result.rc != 0

- name: Fail when kinit did not succeed
  ansible.builtin.fail:
    msg: >-
      kinit failed for {{ kerberos_kinit_user | default(ansible_user) }} (rc={{ kinit_result.rc }}).
      {{ ('Error: ' ~ kinit_result.stderr) if (kinit_result.stderr | default('') | length > 0) else 'Check realm/KDC in vars/kerberos.yml and credentials.' }}
      See kerberos-diag-report.txt if display is enabled.
  when: kinit_result.rc != 0

- name: klist immediately after kinit
  ansible.builtin.shell: |
    echo "--- klist after kinit ---" >> {{ kerberos_diag_log_path | quote }}
    if command -v klist >/dev/null 2>&1; then
      klist -e -f -a >> {{ kerberos_diag_log_path | quote }} 2>&1
    else
      echo "ERROR: klist command not found in this EE image!" >> {{ kerberos_diag_log_path | quote }}
    fi
  changed_when: false
  failed_when: false
